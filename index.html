<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chinese Flashcards with Audio</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #c0392b;
            --bg: #fdfcf0; 
        }

        body {
            font-family: "STKaiti", "KaiTi", "楷体", "BiauKai", serif;
            background-color: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            color: var(--primary);
        }

        .container {
            max-width: 650px;
            width: 100%;
            text-align: center;
        }

        .grid {
    display: grid;
    /* This makes 1 column on small screens and 2 on larger ones */
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 15px;
    margin-top: 20px;
    width: 100%;
}

        .card {
            background: white;
            border-radius: 15px;
            padding: 40px 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.08);
            border: 2px solid transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }

        .card:hover {
            transform: scale(1.03);
            border-color: #e0d9b5;
        }

        .card:active {
            transform: scale(0.98);
            background-color: #f9f9f9;
        }

        .char {
            font-size: 120px;
            margin: 0;
            line-height: 1.1;
        }

        .pinyin {
            margin-top: 15px;
            font-size: 26px;
            color: var(--accent);
            height: 30px;
            font-weight: bold;
            font-family: 'Segoe UI', sans-serif;
            visibility: hidden;
        }

        .pinyin.visible { 
            visibility: visible; 
        }

        .hint {
            font-size: 14px;
            color: #888;
            margin-top: 10px;
            font-family: sans-serif;
        }

        .controls {
            margin-top: 40px;
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        button {
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        #shuffle { background: var(--primary); color: white; }
        #reveal { background: #fff; border: 2px solid var(--primary); color: var(--primary); }

        button:hover { opacity: 0.9; transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="container">
    <h1>Chinese Flashcards</h1>
    <p class="hint">Click a card to hear the pronunciation</p>
    
    <div class="grid" id="cardGrid"></div>

    <div class="controls">
        <button id="shuffle">New Characters</button>
        <button id="reveal">Show/Hide Pinyin</button>
    </div>
</div>

<script>
    const rawList = "上下大小又了个不人口手心牙头舌耳木土水火山天日月刀尺门书牛羊马只白云风雨花石飞太米光毛子工几力气里外没有把的多少开关去来什么还会男女左右好坏在这也对要是我们你他";
    const charArray = rawList.split('');

    const pinyinMap = {
        '上':'shàng','下':'xià','大':'dà','小':'xiǎo','又':'yòu','了':'le','个':'gè','不':'bù','人':'rén','口':'kǒu','手':'shǒu','心':'xīn','牙':'yá','头':'tóu','舌':'shé','耳':'ěr','木':'mù','土':'tǔ','水':'shuǐ','火':'huǒ','山':'shān','天':'tiān','日':'rì','月':'yuè','刀':'dāo','尺':'chǐ','门':'mén','书':'shū','牛':'niú','羊':'yáng','马':'mǎ','只':'zhī','白':'bái','云':'yún','风':'fēng','雨':'yǔ','花':'huā','石':'shí','飞':'fēi','太':'tài','米':'mǐ','光':'guāng','毛':'máo','子':'zǐ','工':'gōng','几':'jǐ','力':'lì','气':'qì','里':'lǐ','外':'wài','没':'méi','有':'yǒu','把':'bǎ','的':'de','多':'duō','少':'shǎo','开':'kāi','关':'guān','去':'qù','来':'lái','什':'shén','么':'me','还':'hái','会':'huì','男':'nán','女':'nǚ','左':'zuǒ','右':'yòu','好':'hǎo','坏':'huài','在':'zài','这':'zhè','也':'yě','对':'duì','要':'yào','是':'shì','我':'wǒ','们':'men','你':'nǐ','他':'tā'
    };

    const grid = document.getElementById('cardGrid');
    const shuffleBtn = document.getElementById('shuffle');
    const revealBtn = document.getElementById('reveal');

    // Speech Function
    function speak(text) {
        // Cancel any ongoing speech
        window.speechSynthesis.cancel();
        
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-CN'; // Set language to Chinese
        utterance.rate = 0.8;    // Slightly slower for beginners
        window.speechSynthesis.speak(utterance);
    }

    function renderCards() {
        const shuffled = [...charArray].sort(() => 0.5 - Math.random());
        const selected = shuffled.slice(0, 4);

        grid.innerHTML = '';
        selected.forEach(c => {
            const p = pinyinMap[c] || '';
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="char">${c}</div>
                <div class="pinyin">${p}</div>
            `;
            
            // Add click event for audio
            card.addEventListener('click', () => speak(c));
            
            grid.appendChild(card);
        });
    }

    shuffleBtn.addEventListener('click', renderCards);
    
    revealBtn.addEventListener('click', () => {
        const pinyins = document.querySelectorAll('.pinyin');
        pinyins.forEach(p => p.classList.toggle('visible'));
    });

    renderCards();
</script>

</body>
</html>
