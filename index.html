<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ka Yan's Learning Chinese is Fun</title>
    <link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #FF6B6B; --secondary: #4ECDC4; --yellow: #FFE66D;
            --blue: #45aaf2; --bg: #F7FFF7; --text: #2F2F2F; --shadow: #d4e5d4;
            --lib-border: #e8e8e8; --purple: #a55eea;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg);
            margin: 0; padding: 0; color: var(--text); overscroll-behavior: none;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        .header {
            width: 100%; max-width: 900px; display: flex; justify-content: space-between;
            align-items: center; padding: 15px; box-sizing: border-box;
        }

        h1 { font-size: 20px; color: var(--primary); margin: 0; font-family: 'Klee One', cursive; font-weight: 600; }

        .fullscreen-btn {
            background: #eee; color: #666; font-size: 12px; padding: 8px 12px;
            border-radius: 10px; border: 1px solid #ddd; cursor: pointer; font-weight: bold;
        }

        .nav-bar {
            position: fixed; bottom: 0; width: 100%; background: white; 
            display: flex; justify-content: space-around; padding: 10px 0;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.08); z-index: 100;
        }

        .nav-item { font-family: 'Klee One', cursive; font-weight: bold; color: #888; cursor: pointer; font-size: 14px; text-align: center; flex: 1; }
        .nav-item i { display: block; font-size: 24px; margin-bottom: 2px; font-style: normal; }
        .nav-item.active { color: var(--primary); }

        .page { display: none; width: 100%; max-width: 500px; padding: 5px 10px 100px 10px; text-align: center; box-sizing: border-box; }
        .page.active { display: flex; flex-direction: column; align-items: center; }

        .welcome-container { padding: 20px; text-align: center; width: 100%; }
        
        /* UPDATED QUOTE BOX */
        .quote-box { 
            background: white; padding: 25px; border-radius: 20px; 
            border: 3px dashed var(--secondary); margin: 20px 0; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.05); min-height: 80px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: transform 0.2s, background-color 0.2s;
        }
        .quote-box:active { transform: scale(0.98); background-color: #f0fff0; }
        .quote-box p { font-family: 'Klee One', cursive; font-size: 19px; color: #444; line-height: 1.4; margin: 0; font-weight: 600; }
        .speaker-hint { font-size: 14px; color: var(--secondary); margin-top: 8px; font-weight: bold; }

        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; margin-top: 10px; }
        .menu-btn { 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 25px 10px; border-radius: 25px; border: none; color: white; cursor: pointer;
            box-shadow: 0 6px 0 rgba(0,0,0,0.1); transition: transform 0.1s;
        }
        .menu-btn i { font-size: 40px; margin-bottom: 10px; font-style: normal; }
        .menu-btn span { font-size: 18px; font-family: 'Klee One', cursive; font-weight: bold; }

        .hint { background: var(--yellow); padding: 5px 15px; border-radius: 20px; font-size: 14px; font-weight: bold; display: inline-block; margin-bottom: 10px; }
        .char-font { font-family: "STKaiti", "KaiTi", "楷体", serif; }
        
        /* GRID STYLES */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; width: 100%; }
        .card { background: white; border-radius: 20px; min-height: 130px; box-shadow: 0 6px 0px var(--shadow); border: 4px solid var(--secondary); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; }
        .play-char { font-size: 65px; line-height: 1; color: #000; }
        .lib-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; width: 100%; }
        .lib-item { background: white; border-radius: 12px; padding: 10px 0; border: 2px solid var(--lib-border); display: flex; flex-direction: column; align-items: center; justify-content: center; aspect-ratio: 1/1.15; cursor: pointer; }
        .lib-char { font-size: 36px; font-weight: bold; color: #000; }
        .lib-pinyin { font-size: 11px; color: var(--primary); font-weight: bold; }
        .match-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; width: 100%; }
        .match-card { background: white; border-radius: 15px; border: 3px solid var(--secondary); display: flex; align-items: center; justify-content: center; aspect-ratio: 2.2 / 1; padding: 10px; cursor: pointer; }
        .match-char-text { font-size: 48px; font-weight: bold; color: #000; }
        .match-pinyin-text { font-size: 22px; color: var(--primary); font-weight: 900; }
        .match-card-selected { background-color: var(--yellow) !important; border-color: var(--primary) !important; }

        button.action-btn { padding: 12px 20px; border-radius: 15px; border: none; color: white; font-weight: 900; cursor: pointer; font-size: 14px; font-family: 'Klee One', cursive; box-shadow: 0 4px 0 rgba(0,0,0,0.1); }
        #focus-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 200; align-items: center; justify-content: center; }
        .focus-card { background: white; width: 280px; padding: 20px; border-radius: 30px; display: flex; flex-direction: column; align-items: center; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Ka Yan's Chinese ✨</h1>
        <button id="fullscreenToggle" class="fullscreen-btn" onclick="toggleFullScreen()">🖥️ FULLSCREEN</button>
    </div>

    <div id="home-page" class="page active">
        <div class="welcome-container">
            <h2 style="font-family: 'Klee One', cursive; color: var(--primary); font-size: 28px; margin-bottom: 0;">Hi Ka Yan! 👋</h2>
            <div class="quote-box" onclick="readQuoteOutLoud()">
                <p id="motivational-quote">Loading magic words...</p>
                <div class="speaker-hint">Tap to hear me! 🔉</div>
            </div>
            <div class="menu-grid">
                <div class="menu-btn" style="background: var(--secondary);" onclick="showPage('game', document.getElementById('nav-game'))">
                    <i>📖</i><span>Learn</span>
                </div>
                <div class="menu-btn" style="background: var(--blue);" onclick="showPage('trace', document.getElementById('nav-trace'))">
                    <i>✍️</i><span>Trace</span>
                </div>
                <div class="menu-btn" style="background: var(--purple);" onclick="showPage('match', document.getElementById('nav-match'))">
                    <i>🧩</i><span>Match</span>
                </div>
                <div class="menu-btn" style="background: var(--primary);" onclick="showPage('lib', document.getElementById('nav-lib'))">
                    <i>📚</i><span>Library</span>
                </div>
            </div>
        </div>
    </div>

    <div id="game-page" class="page">
        <div id="cardGrid" class="grid"></div>
        <div style="margin-top:20px; display:flex; gap:12px; justify-content:center; flex-wrap: wrap;">
            <button id="backBtn" class="action-btn" onclick="goBack()" style="background:var(--yellow); color:var(--text); min-width: 100px;" disabled>⬅️ BACK</button>
            <button class="action-btn" onclick="shufflePlay()" style="background:var(--secondary); min-width: 100px;">🔄 NEW</button>
            <button class="action-btn" onclick="togglePinyin('play')" style="background:var(--primary); min-width: 100px;">👀 PINYIN</button>
        </div>
    </div>

    <div id="trace-page" class="page">
        <div class="hint" id="trace-msg">Watch... 👁️</div>
        <div style="background:white; padding:15px; border-radius:20px; border:4px solid var(--secondary); margin-bottom:15px;"><div id="writer-container"></div></div>
        <div id="trace-pinyin" style="font-size:22px; color:var(--primary); font-weight:900; visibility:hidden; height:30px;"></div>
        <div style="display:flex; gap:12px; justify-content:center; flex-wrap: wrap;">
            <button class="action-btn" onclick="replayStrokes()" style="background:var(--blue); min-width: 100px;">🔁 REPLAY</button>
            <button class="action-btn" onclick="togglePinyin('trace')" style="background:var(--primary); min-width: 100px;">👀 PINYIN</button>
            <button class="action-btn" onclick="newTraceChar()" style="background:var(--secondary); min-width: 100px;">🔄 NEXT</button>
        </div>
    </div>

    <div id="match-page" class="page">
        <div id="match-hint" class="hint">Find the pairs! 🧩</div>
        <div id="matchGrid" class="match-grid"></div>
        <div style="margin-top:20px;"><button id="match-next-btn" class="action-btn" onclick="startMatchGame()" style="display:none; background:var(--secondary); min-width: 180px;">🎮 PLAY AGAIN</button></div>
    </div>

    <div id="lib-page" class="page">
        <div class="hint">Tap to listen 🔉 and Hold (2s) to see strokes 🔍</div>
        <div id="libGrid" class="lib-grid"></div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="showPage('home', this)"><i>🏠</i>Home</div>
        <div id="nav-game" class="nav-item" onclick="showPage('game', this)"><i>📖</i>Learn</div>
        <div id="nav-trace" class="nav-item" onclick="showPage('trace', this)"><i>✍️</i>Trace</div>
        <div id="nav-match" class="nav-item" onclick="showPage('match', this)"><i>🧩</i>Match</div>
        <div id="nav-lib" class="nav-item" onclick="showPage('lib', this)"><i>📚</i>Lib</div>
    </div>

    <div id="focus-overlay" onclick="closeFocus()">
        <div class="focus-card" onclick="event.stopPropagation()">
            <div id="focus-writer-container"></div>
            <div id="focus-pinyin-val" style="font-size:28px; color:var(--primary); font-weight:bold; margin-top:10px;"></div>
            <button class="action-btn" onclick="animateFocusOnly()" style="background:var(--blue); width:100%; margin-top:15px;">🔁 REPLAY</button>
        </div>
    </div>

<script>
    const quotes = [
        "Every little character you learn is a new seed in your secret garden! 🌱",
        "Your brain is like a superhero muscle! Every time you practice, it gets stronger! 💪",
        "Learning is like a treasure hunt—each word is a gold coin! 🪙",
        "You are a star student! Keep shining and keep learning! ⭐",
        "Big things start small. Just like a giant tree starts as a tiny seed! 🌳",
        "Every stroke you draw is a step toward becoming a master artist! 🎨",
        "Mistakes are just happy little helpers that teach us how to grow! ✨",
        "You have the power to learn anything. You're amazing, Ka Yan! 🚀",
        "Practice makes progress! You are doing better and better every day! 📈",
        "Chinese is like a puzzle, and you are great at finding the right pieces! 🧩"
    ];

    const rawList = "上下大小又了个不人口手心牙头舌耳木土水火山天日月刀尺门书牛羊马只白云风雨花石飞太米光毛子工几力气里外没有把的多少开关去来什么是还会男女左右好坏在这也对要是我们你他";
    const charArray = rawList.split('');
    const pinyinMap = {'上':'shàng','下':'xià','大':'dà','小':'xiǎo','又':'yòu','了':'le','个':'gè','不':'bù','人':'rén','口':'kǒu','手':'shǒu','心':'xīn','牙':'yá','头':'tóu','舌':'shé','耳':'ěr','木':'mù','土':'tǔ','水':'shuǐ','火':'huǒ','山':'shān','天':'tiān','日':'rì','月':'yuè','刀':'dāo','尺':'chǐ','门':'mén','书':'shū','牛':'niú','羊':'yáng','马':'mǎ','只':'zhī','白':'bái','云':'yún','风':'fēng','雨':'yǔ','花':'huā','石':'shí','飞':'fēi','太':'tài','米':'mǐ','光':'guāng','毛':'máo','子':'zǐ','工':'gōng','几':'jǐ','力':'lì','气':'qì','里':'lǐ','外':'wài','没':'méi','有':'yǒu','把':'bǎ','的':'de','多':'duō','少':'shǎo','开':'kāi','关':'guān','去':'qù','来':'lái','什':'shén','么':'me','是':'shì','还':'hái','会':'huì','男':'nán','女':'nǚ','左':'zuǒ','右':'yòu','好':'hǎo','坏':'huài','在':'zài','这':'zhè','也':'yě','对':'duì','要':'yào','我':'wǒ','们':'men','你':'nǐ','他':'tā'};

    let writer, focusWriter, currentTraceChar = "";
    let playPinyinVisible = false, tracePinyinVisible = false, playHistory = [], currentSet = [], pressTimer;

    function setRandomQuote() {
        const randomIndex = Math.floor(Math.random() * quotes.length);
        document.getElementById('motivational-quote').innerText = quotes[randomIndex];
    }

    // New function to read English quotes out loud
    function readQuoteOutLoud() {
        window.speechSynthesis.cancel();
        const text = document.getElementById('motivational-quote').innerText;
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'en-US'; // Quotes are in English
        u.rate = 0.9;
        window.speechSynthesis.speak(u);
    }

    function toggleFullScreen() {
        if (!document.fullscreenElement) { document.documentElement.requestFullscreen(); document.getElementById('fullscreenToggle').innerText = "❌ EXIT"; }
        else { document.exitFullscreen(); document.getElementById('fullscreenToggle').innerText = "🖥️ FULLSCREEN"; }
    }

    function showPage(pageId, navEl) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(pageId + '-page').classList.add('active');
        navEl.classList.add('active');
        if (pageId === 'home') { setRandomQuote(); window.speechSynthesis.cancel(); }
        if (pageId === 'trace') newTraceChar();
        if (pageId === 'match') startMatchGame();
    }

    function speak(text) { window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(text); u.lang = 'zh-CN'; u.rate = 0.8; window.speechSynthesis.speak(u); }

    function togglePinyin(mode) {
        if (mode === 'play') { playPinyinVisible = !playPinyinVisible; document.querySelectorAll('#game-page .pinyin-label').forEach(p => p.style.visibility = playPinyinVisible ? 'visible' : 'hidden'); }
        else if (mode === 'trace') { tracePinyinVisible = !tracePinyinVisible; document.getElementById('trace-pinyin').style.visibility = tracePinyinVisible ? 'visible' : 'hidden'; }
    }

    function shufflePlay() {
        if (currentSet.length > 0) playHistory.push([...currentSet]);
        currentSet = [...charArray].sort(() => 0.5 - Math.random()).slice(0, 4);
        renderPlayCards(currentSet);
        document.getElementById('backBtn').disabled = playHistory.length === 0;
    }

    function goBack() { if (playHistory.length > 0) { currentSet = playHistory.pop(); renderPlayCards(currentSet); document.getElementById('backBtn').disabled = playHistory.length === 0; } }

    function renderPlayCards(chars) {
        const grid = document.getElementById('cardGrid'); grid.innerHTML = '';
        chars.forEach(c => {
            const card = document.createElement('div'); card.className = 'card';
            card.innerHTML = `<div class="char-font play-char">${c}</div><div class="pinyin-label" style="font-size:18px; color:var(--primary); font-weight:900; visibility:${playPinyinVisible?'visible':'hidden'}">${pinyinMap[c]||''}</div>`;
            card.onclick = () => speak(c); grid.appendChild(card);
        });
    }

    function newTraceChar() {
        currentTraceChar = charArray[Math.floor(Math.random() * charArray.length)];
        document.getElementById('writer-container').innerHTML = '';
        document.getElementById('trace-pinyin').innerText = pinyinMap[currentTraceChar] || '';
        writer = HanziWriter.create('writer-container', currentTraceChar, { width: 220, height: 220, padding: 10, showOutline: true, strokeAnimationSpeed: 1.5, strokeColor: '#FF6B6B' });
        replayStrokes();
    }

    function replayStrokes() {
        if (!writer) return;
        document.getElementById('trace-msg').innerText = "Watch... 👁️";
        writer.cancelQuiz();
        writer.animateCharacter({ onComplete: () => {
            document.getElementById('trace-msg').innerText = "Your turn! ✍️";
            writer.quiz({ onComplete: () => { speak(currentTraceChar); confetti({ particleCount: 30 }); }});
        }});
    }

    function startMatchGame() {
        document.getElementById('match-next-btn').style.display = 'none';
        document.getElementById('match-hint').innerText = "Find the pairs! 🧩";
        const selected = [...charArray].sort(() => 0.5 - Math.random()).slice(0, 4);
        let cards = [];
        selected.forEach(c => { cards.push({val: c, m: c, type: 'c'}); cards.push({val: pinyinMap[c], m: c, type: 'p'}); });
        cards.sort(() => 0.5 - Math.random());
        const grid = document.getElementById('matchGrid'); grid.innerHTML = ''; let first = null, matches = 0;
        cards.forEach(d => {
            const el = document.createElement('div'); el.className = 'match-card';
            el.innerHTML = d.type === 'c' ? `<div class="char-font match-char-text">${d.val}</div>` : `<div class="match-pinyin-text">${d.val}</div>`;
            el.onclick = () => {
                if(el.style.opacity === '0.2' || el.classList.contains('match-card-selected')) return;
                el.classList.add('match-card-selected');
                if(!first) { first = {el, d}; } else {
                    if(first.d.m === d.m) {
                        const c1 = first.el, c2 = el;
                        setTimeout(() => { c1.style.opacity = '0.2'; c2.style.opacity = '0.2'; matches++;
                            if(matches === 4) { document.getElementById('match-hint').innerText = "Awesome! 🌟"; document.getElementById('match-next-btn').style.display = 'inline-block'; confetti({ particleCount: 80 }); }
                        }, 300); speak(d.m);
                    } else {
                        const c1 = first.el, c2 = el;
                        setTimeout(() => { c1.classList.remove('match-card-selected'); c2.classList.remove('match-card-selected'); }, 500);
                    }
                    first = null;
                }
            };
            grid.appendChild(el);
        });
    }

    function renderLib() {
        const grid = document.getElementById('libGrid');
        charArray.forEach((c) => {
            const item = document.createElement('div'); item.className = 'lib-item';
            item.innerHTML = `<div class="char-font lib-char">${c}</div><div class="lib-pinyin">${pinyinMap[c]||''}</div>`;
            const startPress = () => { pressTimer = window.setTimeout(() => openFocus(c), 2000); };
            const endPress = () => { window.clearTimeout(pressTimer); };
            item.ontouchstart = startPress; item.ontouchend = endPress;
            item.onmousedown = startPress; item.onmouseup = endPress;
            item.onclick = () => speak(c); grid.appendChild(item);
        });
    }

    function openFocus(c) {
        document.getElementById('focus-writer-container').innerHTML = '';
        document.getElementById('focus-pinyin-val').innerText = pinyinMap[c] || '';
        document.getElementById('focus-overlay').style.display = 'flex';
        focusWriter = HanziWriter.create('focus-writer-container', c, { width: 220, height: 220, padding: 10, showOutline: true, strokeColor: '#FF6B6B' });
        speak(c); focusWriter.animateCharacter();
    }
    function closeFocus() { document.getElementById('focus-overlay').style.display = 'none'; }
    function animateFocusOnly() { if (focusWriter) focusWriter.animateCharacter(); }

    // Init
    setRandomQuote();
    shufflePlay();
    renderLib();
</script>
</body>
</html>
