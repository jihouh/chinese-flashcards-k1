<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fun Chinese Cards</title>
    <link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF6B6B;
            --secondary: #4ECDC4;
            --yellow: #FFE66D;
            --bg: #F7FFF7;
            --card-bg: #FFFFFF;
            --text: #2F2F2F;
            --shadow: #d4e5d4;
        }

        /* Night Mode Colors */
        body.night {
            --bg: #1A1A2E;
            --card-bg: #16213E;
            --text: #E94560;
            --secondary: #0F3460;
            --shadow: #000000;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            color: var(--text);
            transition: background-color 0.4s, color 0.4s;
            overscroll-behavior-y: contain;
        }

        .container {
            max-width: 800px;
            width: 100%;
            text-align: center;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 450px;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 28px;
            color: var(--primary);
            margin: 0;
            font-family: 'Klee One', cursive;
        }

        #theme-toggle {
            background: none;
            border: 2px solid var(--primary);
            color: var(--primary);
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 14px;
            box-shadow: none;
            cursor: pointer;
        }

        .hint {
            background: var(--yellow);
            padding: 8px 20px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: bold;
            display: inline-block;
            margin: 15px 0;
            color: #2F2F2F;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 0 auto;
        }

        .card {
            background: var(--card-bg);
            border-radius: 30px;
            padding: 30px 10px;
            box-shadow: 0 8px 0px var(--shadow);
            border: 4px solid var(--secondary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        /* DEFAULT Desktop Style (KaiTi) */
        .char {
            font-family: "STKaiti", "KaiTi", "楷体", serif;
            font-size: 130px;
            margin: 0;
            line-height: 1.1;
            color: var(--text);
        }

        /* MOBILE OVERRIDE (Iansui/Klee One) */
        @media (max-width: 768px) {
            .char {
                font-family: 'Klee One', cursive;
                font-size: 100px;
                font-weight: 600;
            }
            .grid { max-width: 100%; }
        }

        .pinyin {
            margin-top: 10px;
            font-size: 24px;
            color: var(--primary);
            font-weight: 900;
            height: 30px;
            visibility: hidden;
            font-family: sans-serif;
        }

        .pinyin.visible { visibility: visible; }

        .controls {
            margin-top: 30px;
            display: flex;
            gap: 15px;
            justify-content: center;
            width: 100%;
        }

        button {
            padding: 15px 25px;
            font-size: 18px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            color: white;
            box-shadow: 0 6px 0px rgba(0,0,0,0.1);
            font-family: 'Klee One', cursive;
            transition: transform 0.1s;
        }

        #shuffle { background: var(--secondary); }
        #reveal { background: var(--primary); }

        button:active, .card:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0px var(--shadow);
        }

        /* Night mode adjustment for pinyin visibility */
        body.night .pinyin { color: var(--yellow); }
    </style>
</head>
<body>

<div class="container">
    <div class="top-bar">
        <h1>Magic Cards! ✨</h1>
        <button id="theme-toggle">🌙 Night Mode</button>
    </div>

    <div class="hint">Tap a card to hear! 🔊</div>

    <div class="grid" id="cardGrid"></div>

    <div class="controls">
        <button id="shuffle">🔄 NEW</button>
        <button id="reveal">👀 PINYIN</button>
    </div>
</div>

<script>
    const rawList = "上下大小又了个不人口手心牙头舌耳木土水火山天日月刀尺门书牛羊马只白云风雨花石飞太米光毛子工几力气里外没有把的多少开关去来什么还会男女左右好坏在这也对要是我们你他";
    const charArray = rawList.split('');

    const pinyinMap = {
        '上':'shàng','下':'xià','大':'dà','小':'xiǎo','又':'yòu','了':'le','个':'gè','不':'bù','人':'rén','口':'kǒu','手':'shǒu','心':'xīn','牙':'yá','头':'tóu','舌':'shé','耳':'ěr','木':'mù','土':'tǔ','水':'shuǐ','火':'huǒ','山':'shān','天':'tiān','日':'rì','月':'yuè','刀':'dāo','尺':'chǐ','门':'mén','书':'shū','牛':'niú','羊':'yáng','马':'mǎ','只':'zhī','白':'bái','云':'yún','风':'fēng','雨':'yǔ','花':'huā','石':'shí','飞':'fēi','太':'tài','米':'mǐ','光':'guāng','毛':'máo','子':'zǐ','工':'gōng','几':'jǐ','力':'lì','气':'qì','里':'lǐ','外':'wài','没':'méi','有':'yǒu','把':'bǎ','的':'de','多':'duō','少':'shǎo','开':'kāi','关':'guān','去':'qù','来':'lái','什':'shén','么':'me','还':'hái','会':'huì','男':'nán','女':'nǚ','左':'zuǒ','右':'yòu','好':'hǎo','坏':'huài','在':'zài','这':'zhè','也':'yě','对':'duì','要':'yào','是':'shì','我':'wǒ','们':'men','你':'nǐ','他':'tā'
    };

    const grid = document.getElementById('cardGrid');
    const shuffleBtn = document.getElementById('shuffle');
    const revealBtn = document.getElementById('reveal');
    const themeBtn = document.getElementById('theme-toggle');

    // Speech & Vibrate
    function speak(text) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-CN';
        utterance.rate = 0.75;
        window.speechSynthesis.speak(utterance);
        if (navigator.vibrate) navigator.vibrate(40);
    }

    // Theme Toggle Logic
    themeBtn.onclick = () => {
        document.body.classList.toggle('night');
        const isNight = document.body.classList.contains('night');
        themeBtn.innerText = isNight ? "☀️ Day Mode" : "🌙 Night Mode";
        if (navigator.vibrate) navigator.vibrate(20);
    };

    function renderCards() {
        const shuffled = [...charArray].sort(() => 0.5 - Math.random());
        const selected = shuffled.slice(0, 4);
        grid.innerHTML = '';
        selected.forEach(c => {
            const p = pinyinMap[c] || '';
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<div class="char">${c}</div><div class="pinyin">${p}</div>`;
            card.onclick = () => speak(c);
            grid.appendChild(card);
        });
    }

    shuffleBtn.onclick = renderCards;
    revealBtn.onclick = () => {
        document.querySelectorAll('.pinyin').forEach(p => p.classList.toggle('visible'));
    };

    renderCards();
</script>

</body>
</html>
